<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrus | Em Construção</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2d3436;
            margin-bottom: 0.5rem;
        }
        p {
            color: #636e72;
            font-size: 1.1rem;
        }
        .badge {
            display: inline-block;
            background-color: #00b894;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">SITE NO AR</div>
        <h1>Olá, eu sou o Petrus</h1>
        <p>Testando coisas na internet hospedado via GitHub Pages.</p>
        <p>O teste de domínio .com via Cloudflare foi um sucesso! 🚀</p>
        
        <div class="footer">
            &copy; 2026 Petrus - Feito com código e café.
        </div>
    </div>

</body>
</html>
